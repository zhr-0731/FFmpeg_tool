name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download FFmpeg core files (single‑thread, compatible with GitHub Pages)
        run: |
          curl -L -o ffmpeg-core.js https://unpkg.com/@ffmpeg/core@0.12.10/dist/umd/ffmpeg-core.js
          curl -L -o ffmpeg-core.wasm https://unpkg.com/@ffmpeg/core@0.12.10/dist/umd/ffmpeg-core.wasm
          ls -la ffmpeg-core.*

      - name: Commit and push downloaded files (with merge if needed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ffmpeg-core.js ffmpeg-core.wasm
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update FFmpeg core files (single-thread)"
            # 尝试拉取远程更改并变基，解决冲突后继续推送
            git pull --rebase origin main
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
