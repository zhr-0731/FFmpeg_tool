name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write        # 允许提交文件
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download FFmpeg core files (single‑thread, compatible with GitHub Pages)
        run: |
          curl -L -o ffmpeg-core.js https://unpkg.com/@ffmpeg/core@0.12.10/dist/umd/ffmpeg-core.js
          curl -L -o ffmpeg-core.wasm https://unpkg.com/@ffmpeg/core@0.12.10/dist/umd/ffmpeg-core.wasm
          # 注意：单线程版不需要 .worker.js 文件
          ls -la ffmpeg-core.*

      - name: Commit and push downloaded files (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ffmpeg-core.js ffmpeg-core.wasm
          git diff --cached --quiet || git commit -m "Add FFmpeg core files (single-thread)"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
